services:
  - type: web
    name: telegram-binance-sniper-bot
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: 3000
    disk:
      name: bot-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
